server {
    listen 80;
    # Sửa lại: server_name chỉ chứa tên miền, không chứa https://
    server_name my-laravel-app-lb2l.onrender.com;

    # Trỏ thẳng vào thư mục public của Laravel
    root /var/www/html/public;

    index index.php index.html;

    # 1. Bảo mật Header & Ẩn thông tin phiên bản server
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    server_tokens off; 

    charset utf-8;

    # Cấu hình log
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    # 2. Chặn truy cập vào tất cả các file ẩn (bắt đầu bằng dấu chấm) bao gồm .env
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 3. Chặn các file cấu hình quan trọng khác
    location ~ ^/(composer\.json|composer\.lock|package\.json|package-lock\.json|phpunit\.xml)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 4. Chặn truy cập trực tiếp vào các thư mục hệ thống (phòng trường hợp cấu hình sai)
    location ~ ^/(app|bin|config|database|resources|routes|storage|tests|vendor)/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location / {
        # Thử tìm file thực tế, nếu không có thì đẩy về index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; 
    log_not_found off; 
    }
    location = /robots.txt  { access_log off; 
    log_not_found off; 
    }

    error_page 404 /index.php;

    # Xử lý PHP thông qua PHP-FPM
    location ~ \.php$ {
        # Chú ý: Nếu dùng Docker compose, hãy thay 127.0.0.1 bằng tên service PHP (vd: app:9000)
        fastcgi_pass 127.0.0.1:9000; 
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Ẩn header tiết lộ phiên bản PHP
        fastcgi_hide_header X-Powered-By;
    }
}