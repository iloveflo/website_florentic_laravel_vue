server {
    listen 80;
    server_name https://my-laravel-app-lb2l.onrender.com;
    
    # Trỏ thẳng vào thư mục public của Laravel
    root /var/www/html/public;

    index index.php index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    # Cấu hình log (tùy chọn, để xem lỗi cho dễ)
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    location / {
        # Thử tìm file thực tế, nếu không có thì đẩy về index.php (Laravel Router xử lý)
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off;
     log_not_found off; 
    }
    location = /robots.txt  { access_log off; 
    log_not_found off; 
    }

    error_page 404 /index.php;

    # Xử lý PHP thông qua PHP-FPM
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000; # PHP-FPM trong cùng container lắng nghe port này
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}